server:
  error:
  #    include-stacktrace: on_param
  port: 8081
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: text/html,text/css,text/plain,text/xml,application/javascript,application/json
  servlet:
    context-path: /comialex/api/${application.api_name}
    session:
      timeout: 21600s


logging:
  level:
    root: INFO

    # Tu dominio
    integra: INFO
    integra.config.cache.CacheConfig: INFO
    integra.config.cache.CacheService: INFO
    integra.config.cache.CustomCacheErrorHandler: WARN

    # Hibernate (CRÍTICO en prod)
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.type.descriptor.sql: OFF

    # Spring interno (reducir ruido)
    org.springframework: WARN
    org.springframework.web: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/integra.log

  logback:
    rollingpolicy:
      file-name-pattern: "logs/archived/integra-%d{yyyy-MM-dd}.%i.log"
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 100MB

  exception-pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n%throwable{5}"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n%throwable"

integra:
  sync:
    usuarios:
      output-dir: ./integra-config/sync-usuarios/
  cache:
    specs:
      unidadContacto:
        expireAfterWrite: 28d
        expireAfterAccess: 7d
        maximumSize: 2000
        recordStats: true
        initialCapacity: 50
      unidadBuscar:
        expireAfterWrite: 1h
        expireAfterAccess: 30m
        maximumSize: 1000
        recordStats: true
        initialCapacity: 100
      rolesPermisos:
        expireAfterWrite: 28d
        maximumSize: 100
        recordStats: true
        initialCapacity: 30
      rolPorId:
        expireAfterWrite: 28d
        maximumSize: 100
        recordStats: true
        initialCapacity: 30
      empleadoPorId:
        expireAfterWrite: 1h
        maximumSize: 5000
        recordStats: true
        initialCapacity: 200
      empleadoPorNip:
        expireAfterWrite: 7d        # Expira después de 7 días (más tiempo en producción)
        expireAfterAccess: 24h      # Renueva si se accede en 24 horas
        maximumSize: 5000           # Máximo 5000 empleados en caché
        recordStats: true           # Habilitar métricas
        initialCapacity: 590        # Capacidad inicial
      parametros:
        expireAfterWrite: 1h
        maximumSize: 100
        recordStats: true

